name: Build Docker images

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, order-service, user-service]
      fail-fast: false   # don't cancel sibling jobs on failure

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3 # Логин в GHCR на стороне GitHub Runner ЧТОБЫ далее запушить Docker образ в GHCR
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }} # user that triggered the workflow (automatically provided by GitHub)
          password: ${{ secrets.GITHUB_TOKEN }} # auto-generated temporary token created by GitHub for each workflow run (automatically provided by GitHub)

      - name: Build and push
        run: |
            docker build \
              -t ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest \
              ./${{ matrix.service }}
            docker push ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build   # ⬅️ waits for ALL builds

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7 # удобный способ загрузить файлы на сервер
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu/"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3 # выполнить команды на сервере
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/ubuntu
            sudo docker compose pull
            sudo docker compose up -d --remove-orphans