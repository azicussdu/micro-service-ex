# .github/workflows/docker-build.yml
name: Build Docker images

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, order-service, user-service]
      fail-fast: false   # don't cancel sibling jobs on failure

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
            docker build \
              -t ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest \
              ./${{ matrix.service }}
            docker push ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build   # ⬅️ waits for ALL builds

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu/"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/ubuntu
            sudo docker compose pull
            sudo docker compose up -d --remove-orphans